pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "**/*.py"
      run: uv run ruff format --check {staged_files}
    ruff-lint:
      glob: "**/*.py"
      run: uv run ruff check {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: uv run ty check
    test-unit:
      run: uv run pytest tests/unit -q
